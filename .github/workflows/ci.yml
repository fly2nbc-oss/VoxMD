name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: Linux
            cargo_target_dir: src-tauri/target
          - platform: windows-latest
            name: Windows
            cargo_target_dir: C:/cargo-target
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}
    env:
      CARGO_TARGET_DIR: ${{ matrix.cargo_target_dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            libclang-dev \
            llvm-dev \
            libvulkan-dev \
            vulkan-tools \
            glslc

      - name: Set VULKAN_SDK (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: echo "VULKAN_SDK=/usr" >> "$GITHUB_ENV"

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvm) {
            echo "LIBCLANG_PATH=$llvm" >> $env:GITHUB_ENV
          }
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> $env:GITHUB_ENV

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) {
            throw "Vulkan SDK not found under C:\VulkanSDK"
          }
          echo "VULKAN_SDK=$($sdk.FullName)" >> $env:GITHUB_ENV
          echo "$($sdk.FullName)\Bin" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Vulkan)
        run: npm run tauri -- build --features gpu-vulkan
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows portable EXE (no installer)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: voxmd-windows-amd64-portable-exe
          path: ${{ matrix.cargo_target_dir }}/release/voxmd.exe
