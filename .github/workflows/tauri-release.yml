name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            name: Linux
            sha_suffix: linux
          - platform: macos-latest
            name: macOS
            sha_suffix: macos
          - platform: windows-latest
            name: Windows
            sha_suffix: windows
    name: Release (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            libclang-dev \
            llvm-dev

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvm) {
            echo "LIBCLANG_PATH=$llvm" >> $env:GITHUB_ENV
          }

      - name: Install frontend dependencies
        run: npm ci

      - name: Set macOS deployment target
        if: matrix.platform == 'macos-latest'
        run: |
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV
          echo "CMAKE_OSX_DEPLOYMENT_TARGET=10.15" >> $GITHUB_ENV

      - name: Build and publish Tauri release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'VoxMD v__VERSION__'
          releaseBody: |
            ## VoxMD v__VERSION__

            Local audio transcription with Whisper and LLM post-processing.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `.msi` installer |
            | macOS    | `.dmg` |
            | Linux    | `.AppImage` or `.deb` |

            Verify file integrity with the platform-specific `SHA256SUMS-*.txt` files.

            See [CHANGELOG.md](https://github.com/fly2nbc-oss/VoxMD/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false

      - name: Generate SHA256SUMS (Linux / macOS)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          find . -type f \( \
            -name "*.deb" -o -name "*.rpm" -o \
            -name "*.AppImage" -o -name "*.dmg" \
          \) -exec sha256sum {} \; | sort > SHA256SUMS-${{ matrix.sha_suffix }}.txt
          cat SHA256SUMS-${{ matrix.sha_suffix }}.txt

      - name: Generate SHA256SUMS (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $out = @()
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse `
            -Include "*.msi","*.exe","*.nsis" |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              $out += "$hash  $($_.Name)"
            }
          $out | Sort-Object | Set-Content SHA256SUMS-${{ matrix.sha_suffix }}.txt
          Get-Content SHA256SUMS-${{ matrix.sha_suffix }}.txt

      - name: Upload SHA256SUMS to release
        if: steps.tauri.outputs.releaseId != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: SHA256SUMS-${{ matrix.sha_suffix }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
