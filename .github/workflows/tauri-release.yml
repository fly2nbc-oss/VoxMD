name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            name: Linux
            sha_suffix: linux
          - platform: windows-latest
            name: Windows
            sha_suffix: windows
    name: Release (${{ matrix.name }})
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            clang \
            libclang-dev \
            llvm-dev \
            libvulkan-dev \
            vulkan-tools \
            glslc

      - name: Set VULKAN_SDK (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: echo "VULKAN_SDK=/usr" >> "$GITHUB_ENV"

      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvm) {
            echo "LIBCLANG_PATH=$llvm" >> $env:GITHUB_ENV
          }
          echo "CARGO_TARGET_DIR=C:/cargo-target" >> $env:GITHUB_ENV
          echo "CMAKE_BUILD_PARALLEL_LEVEL=1" >> $env:GITHUB_ENV

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          choco install vulkan-sdk -y --no-progress
          $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) {
            throw "Vulkan SDK not found under C:\VulkanSDK"
          }
          echo "VULKAN_SDK=$($sdk.FullName)" >> $env:GITHUB_ENV
          echo "$($sdk.FullName)\Bin" >> $env:GITHUB_PATH

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release (Vulkan)
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'VoxMD v__VERSION__'
          args: --features gpu-vulkan
          releaseBody: |
            ## VoxMD v__VERSION__

            Local audio transcription with Vulkan-enabled Whisper and LLM post-processing.

            ### Downloads

            | Platform | Files |
            |----------|------|
            | Windows  | **Portable** `VoxMD_*_Windows_x86_64_portable.exe` — no installer; **MSI**, **NSIS** setup `.exe` in release assets |
            | Linux    | `.AppImage` or `.deb` |

            Verify file integrity with the platform-specific `SHA256SUMS-*.txt` files.

            See [CHANGELOG.md](https://github.com/fly2nbc-oss/VoxMD/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false

      - name: Prepare Windows portable EXE (rename for release)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force portable-dist | Out-Null
          $pkg = node -pe "JSON.parse(require('fs').readFileSync('package.json','utf8')).version"
          Copy-Item "$env:CARGO_TARGET_DIR/release/voxmd.exe" `
            "portable-dist/VoxMD_${pkg}_Windows_x86_64_portable.exe"
          Get-Item "portable-dist/VoxMD_${pkg}_Windows_x86_64_portable.exe"

      - name: Generate SHA256SUMS (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        env:
          OUT: ${{ github.workspace }}/SHA256SUMS-${{ matrix.sha_suffix }}.txt
          BUNDLE_DIR: src-tauri/target/release/bundle
        run: |
          set -eu
          cd "$BUNDLE_DIR"
          find . -type f \( \
            -name "*.deb" -o -name "*.rpm" -o \
            -name "*.AppImage" \
          \) -exec sha256sum {} \; | sort > "$OUT"
          cat "$OUT"

      - name: Generate SHA256SUMS (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          OUT: ${{ github.workspace }}/SHA256SUMS-${{ matrix.sha_suffix }}.txt
        run: |
          $out = @()
          $bundleRoot = "$env:CARGO_TARGET_DIR/release/bundle"
          if (Test-Path $bundleRoot) {
            Get-ChildItem -Path $bundleRoot -Recurse `
              -Include "*.msi","*.exe","*.nsis" `
              -ErrorAction SilentlyContinue |
              ForEach-Object {
                $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
                $out += "$hash  $($_.Name)"
              }
          }
          Get-ChildItem -Path "portable-dist" -Filter "*.exe" `
            -ErrorAction SilentlyContinue |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
              $out += "$hash  $($_.Name)"
            }
          $out | Sort-Object | Set-Content $env:OUT
          Get-Content $env:OUT

      - name: Upload SHA256SUMS to release (Linux)
        if: matrix.platform == 'ubuntu-24.04' && steps.tauri.outputs.releaseId != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: SHA256SUMS-${{ matrix.sha_suffix }}.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload checksum + portable EXE (Windows)
        if: matrix.platform == 'windows-latest' && steps.tauri.outputs.releaseId != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            SHA256SUMS-${{ matrix.sha_suffix }}.txt
            portable-dist/VoxMD_*_Windows_x86_64_portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
